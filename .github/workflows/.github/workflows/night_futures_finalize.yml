name: Night Futures Finalize

on:
  schedule:
    # KST 화~토 06:30  => UTC 월~금 21:30
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: night-futures-finalize
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      KIS_ACCESS_TOKEN: ${{ secrets.KIS_ACCESS_TOKEN }}
      KIS_ACCESS_TOKEN_EXPIRES_AT_KST: ${{ secrets.KIS_ACCESS_TOKEN_EXPIRES_AT_KST }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run final night futures refresh
        run: |
          python collect_night_futures.py

      - name: Commit finalized JSON if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/night_futures/latest.json
          git diff --cached --quiet || git commit -m "Finalize night futures snapshot"
          git push
