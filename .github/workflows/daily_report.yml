name: Daily Market Report

on:
  schedule:
    # US: 07:00 KST = 22:00 UTC (전날)
    - cron: '0 22 * * 0-4'
    # KR: 16:30 KST = 07:30 UTC
    - cron: '30 7 * * 1-5'
  workflow_dispatch:
    inputs:
      run_mode:
        description: 'US, KR, or ALL'
        required: false
        default: 'ALL'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests openpyxl

      - name: Determine RUN_MODE
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RUN_MODE=${{ github.event.inputs.run_mode }}" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "0 22 * * 0-4" ]; then
            echo "RUN_MODE=US" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "30 7 * * 1-5" ]; then
            echo "RUN_MODE=KR" >> $GITHUB_ENV
          else
            echo "RUN_MODE=ALL" >> $GITHUB_ENV
          fi

      - name: Run report generator
        env:
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          RUN_MODE: ${{ env.RUN_MODE }}
        run: python generate_report.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "chore: ${{ env.RUN_MODE }} report $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
