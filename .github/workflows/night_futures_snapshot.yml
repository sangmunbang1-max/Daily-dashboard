name: Night Futures Snapshot

on:
  schedule:
    - cron: '0,30 9-14 * * 1-5'
    - cron: '0,30 15-20 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: night-futures-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run night futures snapshot
        run: python collect_night_futures.py

      - name: Commit updated JSON if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/night_futures/latest.json
          mkdir -p tmp && git add tmp/ || true
          git diff --cached --quiet || git commit -m "Update night futures snapshot"
          git push
