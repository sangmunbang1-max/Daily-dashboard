<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Night Futures Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root{
      --bg:#0b1220;
      --panel:#111827;
      --card:#1f2937;
      --line:#374151;
      --text:#f9fafb;
      --muted:#9ca3af;
      --accent:#60a5fa;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:24px 16px 40px;
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }
    .title{
      font-size:28px;
      font-weight:700;
    }
    .sub{
      color:var(--muted);
      font-size:14px;
      margin-top:4px;
    }
    .btn{
      display:inline-block;
      padding:10px 14px;
      border-radius:10px;
      background:var(--card);
      color:var(--text);
      text-decoration:none;
      border:1px solid var(--line);
    }
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }
    @media (max-width: 900px){
      .grid{grid-template-columns:1fr;}
    }
    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:16px;
      padding:18px;
    }
    .card h2{
      margin:0 0 12px;
      font-size:20px;
    }
    .meta{
      display:flex;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:12px;
      color:var(--muted);
      font-size:14px;
    }
    .stats{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:10px;
      margin-bottom:14px;
    }
    .stat{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px;
    }
    .stat-label{
      color:var(--muted);
      font-size:12px;
      margin-bottom:6px;
    }
    .stat-value{
      font-size:18px;
      font-weight:700;
    }
    .note{
      margin-top:20px;
      color:var(--muted);
      font-size:13px;
    }
    canvas{
      width:100% !important;
      height:320px !important;
      background:#0f172a;
      border-radius:12px;
      padding:8px;
    }
    .empty{
      color:var(--muted);
      padding:24px 0 8px;
      font-size:14px;
    }
    .ok{color:#34d399}
    .warn{color:#fbbf24}
    .bad{color:#f87171}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <div class="title">Night Futures</div>
        <div class="sub" id="pageSub">전일 야간선물 30분 스냅샷</div>
      </div>
      <a class="btn" href="./">← 메인 대시보드로</a>
    </div>

    <div class="meta">
      <div>생성시각: <span id="generatedAt">-</span></div>
      <div>기준일자: <span id="bizDate">-</span></div>
      <div>토큰상태: <span id="tokenStatus" class="warn">-</span></div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>KOSPI 야간선물</h2>
        <div class="stats">
          <div class="stat">
            <div class="stat-label">마지막 값</div>
            <div class="stat-value" id="kospiLast">-</div>
          </div>
          <div class="stat">
            <div class="stat-label">등락</div>
            <div class="stat-value" id="kospiChange">-</div>
          </div>
          <div class="stat">
            <div class="stat-label">포인트 수</div>
            <div class="stat-value" id="kospiPoints">0</div>
          </div>
        </div>
        <canvas id="kospiChart"></canvas>
        <div class="empty" id="kospiEmpty">아직 데이터가 없습니다.</div>
      </div>

      <div class="card">
        <h2>KOSDAQ 야간선물</h2>
        <div class="stats">
          <div class="stat">
            <div class="stat-label">마지막 값</div>
            <div class="stat-value" id="kosdaqLast">-</div>
          </div>
          <div class="stat">
            <div class="stat-label">등락</div>
            <div class="stat-value" id="kosdaqChange">-</div>
          </div>
          <div class="stat">
            <div class="stat-label">포인트 수</div>
            <div class="stat-value" id="kosdaqPoints">0</div>
          </div>
        </div>
        <canvas id="kosdaqChart"></canvas>
        <div class="empty" id="kosdaqEmpty">아직 데이터가 없습니다.</div>
      </div>
    </div>

    <div class="note">
      현재는 <code>docs/data/night_futures/latest.json</code> 파일을 읽도록 구성되어 있다.
      실데이터 연결 전에는 stub 데이터가 표시될 수 있다.
    </div>
  </div>

  <script>
  let kospiChart = null;
  let kosdaqChart = null;

  function fmtNum(v, digits = 2) {
    if (v === null || v === undefined || Number.isNaN(Number(v))) return "-";
    return Number(v).toLocaleString("en-US", {
      minimumFractionDigits: digits,
      maximumFractionDigits: digits
    });
  }

  function fmtSigned(v, digits = 2) {
    if (v === null || v === undefined || Number.isNaN(Number(v))) return "-";
    const n = Number(v);
    const sign = n > 0 ? "+" : "";
    return `${sign}${fmtNum(n, digits)}`;
  }

  function fmtSignedPct(v, digits = 2) {
    if (v === null || v === undefined || Number.isNaN(Number(v))) return "-";
    const n = Number(v);
    const sign = n > 0 ? "+" : "";
    return `${sign}${fmtNum(n, digits)}%`;
  }

  function makeSessionGrid15m() {
    const labels = [];

    // 18:00 ~ 23:45
    for (let h = 18; h <= 23; h++) {
      for (let m = 0; m < 60; m += 15) {
        labels.push(`${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`);
      }
    }

    // 00:00 ~ 05:45
    for (let h = 0; h <= 5; h++) {
      for (let m = 0; m < 60; m += 15) {
        labels.push(`${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`);
      }
    }

    return labels;
  }

  function buildSeriesOnGrid(points) {
    const grid = makeSessionGrid15m();
    const pointMap = new Map();

    (points || []).forEach(p => {
      if (!p || !p.time) return;
      pointMap.set(p.time, p.price ?? null);
    });

    const values = grid.map(t => pointMap.has(t) ? pointMap.get(t) : null);
    return { labels: grid, values };
  }

  function calcYRange(values) {
    const nums = values.filter(v => v !== null && v !== undefined && !Number.isNaN(Number(v))).map(Number);
    if (!nums.length) {
      return { min: 0, max: 100 };
    }

    let min = Math.min(...nums);
    let max = Math.max(...nums);

    if (min === max) {
      const pad = Math.max(Math.abs(min) * 0.01, 1);
      return { min: min - pad, max: max + pad };
    }

    const pad = (max - min) * 0.15;
    return {
      min: min - pad,
      max: max + pad
    };
  }

  function renderMiniStats(summary, prefix) {
    const lastEl = document.getElementById(`${prefix}Last`);
    const chgEl = document.getElementById(`${prefix}Change`);
    const ptsEl = document.getElementById(`${prefix}Points`);

    if (!summary) {
      lastEl.textContent = "-";
      chgEl.textContent = "-";
      ptsEl.textContent = "0";
      return;
    }

    lastEl.textContent = fmtNum(summary.last, 2);

    if (summary.change == null || summary.change_pct == null) {
      chgEl.textContent = "-";
    } else {
      chgEl.textContent = `${fmtSigned(summary.change, 2)} (${fmtSignedPct(summary.change_pct, 2)})`;
    }

    ptsEl.textContent = String(summary.points ?? 0);
  }

  function destroyChartIfExists(chartObj) {
    if (chartObj) chartObj.destroy();
  }

  function makeChart(canvasId, label, points, chartObjRefName) {
    const ctx = document.getElementById(canvasId).getContext("2d");
    const { labels, values } = buildSeriesOnGrid(points || []);
    const yRange = calcYRange(values);

    const data = {
      labels,
      datasets: [
        {
          label,
          data: values,
          borderColor: "#3db2ff",
          backgroundColor: "rgba(61,178,255,0.18)",
          borderWidth: 2,
          pointRadius: (context) => {
            const v = context.raw;
            return v === null ? 0 : 2.5;
          },
          pointHoverRadius: (context) => {
            const v = context.raw;
            return v === null ? 0 : 4;
          },
          spanGaps: false,
          tension: 0.15
        }
      ]
    };

    const config = {
      type: "line",
      data,
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: {
          mode: "index",
          intersect: false
        },
        plugins: {
          legend: {
            display: true,
            labels: {
              color: "#d7e3ff"
            }
          },
          tooltip: {
            callbacks: {
              label: function(context) {
                const v = context.raw;
                if (v == null) return `${label}: -`;
                return `${label}: ${fmtNum(v, 2)}`;
              }
            }
          }
        },
        scales: {
          x: {
            ticks: {
              color: "#9fb3d9",
              autoSkip: false,
              maxRotation: 0,
              callback: function(value, index) {
                const lbl = this.getLabelForValue(value);
                const [hh, mm] = lbl.split(":").map(Number);

                // 1시간 단위만 표시
                if (mm === 0) return lbl;
                return "";
              }
            },
            grid: {
              color: "rgba(159,179,217,0.12)"
            }
          },
          y: {
            min: yRange.min,
            max: yRange.max,
            ticks: {
              color: "#9fb3d9",
              callback: function(value) {
                return fmtNum(value, 0);
              }
            },
            grid: {
              color: "rgba(159,179,217,0.12)"
            }
          }
        }
      }
    };

    if (chartObjRefName === "kospi") {
      destroyChartIfExists(kospiChart);
      kospiChart = new Chart(ctx, config);
    } else if (chartObjRefName === "kosdaq") {
      destroyChartIfExists(kosdaqChart);
      kosdaqChart = new Chart(ctx, config);
    }
  }

  async function loadData() {
    try {
      const res = await fetch("./data/night_futures/latest.json?ts=" + Date.now());
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data = await res.json();

      document.getElementById("generatedAt").textContent = data.generated_at_kst ?? "-";
      document.getElementById("bizDate").textContent = data.biz_date ?? "-";
      document.getElementById("tokenStatus").textContent = data.token_status ?? "-";

      renderMiniStats(data.summary?.kospi, "kospi");
      renderMiniStats(data.summary?.kosdaq, "kosdaq");

      makeChart(
        "kospiChart",
        data.summary?.kospi?.last_name || "KOSPI Night Futures",
        data.series?.kospi || [],
        "kospi"
      );

      makeChart(
        "kosdaqChart",
        data.summary?.kosdaq?.last_name || "KOSDAQ Night Futures",
        data.series?.kosdaq || [],
        "kosdaq"
      );
    } catch (err) {
      console.error(err);
      document.getElementById("generatedAt").textContent = "로드 실패";
    }
  }

  loadData();
</script>
</body>
</html>
